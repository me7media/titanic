<!DOCTYPE html>
<html lang="uk">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Титанік: Легенда океану</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&family=Playfair+Display:ital,wght@0,700;1,700&display=swap"
        rel="stylesheet">
</head>

<body>
    <div id="game-container">
        <div id="film-grain"></div>

        <div id="ui-overlay">
            <header>
                <h1>Титанік</h1>
                <div id="mode-indicator">Режим: <span id="current-mode">Корабель</span></div>
            </header>

            <div id="character-stats" class="hidden">
                <div class="stat-group">
                    <span class="stat-name">Джек</span>
                    <div class="stat-label-row"><span class="stat-icon">🍖</span>
                        <div class="stat-bar">
                            <div id="jack-hunger" class="bar-fill"></div>
                        </div>
                    </div>
                    <div class="stat-label-row"><span class="stat-icon">🌡️</span>
                        <div class="stat-bar">
                            <div id="jack-warmth" class="bar-fill"></div>
                        </div>
                    </div>
                    <div class="stat-label-row"><span class="stat-icon">⚡</span>
                        <div class="stat-bar">
                            <div id="jack-energy" class="bar-fill" style="background:#4af"></div>
                        </div>
                    </div>
                    <div class="stat-label-row"><span class="stat-icon">😊</span>
                        <div class="stat-bar">
                            <div id="jack-mood" class="bar-fill" style="background:#f4a"></div>
                        </div>
                    </div>
                </div>
                <div class="stat-group">
                    <span class="stat-name">Роуз</span>
                    <div class="stat-label-row"><span class="stat-icon">🍖</span>
                        <div class="stat-bar">
                            <div id="rose-hunger" class="bar-fill"></div>
                        </div>
                    </div>
                    <div class="stat-label-row"><span class="stat-icon">🌡️</span>
                        <div class="stat-bar">
                            <div id="rose-warmth" class="bar-fill"></div>
                        </div>
                    </div>
                    <div class="stat-label-row"><span class="stat-icon">⚡</span>
                        <div class="stat-bar">
                            <div id="rose-energy" class="bar-fill" style="background:#4af"></div>
                        </div>
                    </div>
                    <div class="stat-label-row"><span class="stat-icon">😊</span>
                        <div class="stat-bar">
                            <div id="rose-mood" class="bar-fill" style="background:#f4a"></div>
                        </div>
                    </div>
                </div>
            </div>

            <div id="message-display"></div>

            <nav id="controls-hint">
                <div class="hint-item"><span>1</span> 🚢 Керувати кораблем</div>
                <div class="hint-item"><span>2</span> 🧍 Джек</div>
                <div class="hint-item"><span>3</span> 👩 Роуз</div>
                <div class="hint-item"><span>M</span> 🚪 Перейти до кімнати</div>
                <div class="hint-item"><span>E</span> ✅ Їсти / Відпочити / Зігрітись</div>
            </nav>
        </div>

        <div id="start-screen" class="overlay-full">
            <div class="content">
                <h1 class="logo">Титанік 3D</h1>
                <p>Допоможи Джеку та Роуз вижити під час легендарної подорожі</p>
                <button id="start-btn">Почати подорож</button>
            </div>
        </div>
    </div>

    <!-- Three.js (WebGL Engine) -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script type="module" src="js/main.js"></script>
</body>
</html>
