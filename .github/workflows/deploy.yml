name: Deploy to GitHub Pages

on:
  push:
    branches:
      - master

jobs:
  # test:
  #   runs-on: ubuntu-latest
  #   steps:
  #     - name: Checkout 🛎️
  #       uses: actions/checkout@v4

  #     - name: Setup Node.js ⚙️
  #       uses: actions/setup-node@v4
  #       with:
  #         node-version: '20'
  #         cache: 'npm'

  #     - name: Install dependencies 📦
